apiVersion: apps/v1
kind: Deployment
metadata:
  name: tagmytaxi-api
  labels:
    app: tagmytaxi-api
    component: api
    version: "2.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tagmytaxi-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tagmytaxi-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: tagmytaxi-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: tagmytaxi/api:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - secretRef:
                name: tagmytaxi-api-secrets
            - configMapRef:
                name: tagmytaxi-api-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: tagmytaxi-api
---
apiVersion: v1
kind: Service
metadata:
  name: tagmytaxi-api
spec:
  selector:
    app: tagmytaxi-api
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
