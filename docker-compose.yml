version: '3.9'

services:
  # ── Data layer ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tagmytaxi-postgres
    environment:
      POSTGRES_USER: tagmytaxi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: tagmytaxi
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tagmytaxi']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: tagmytaxi-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Application services ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: production
    container_name: tagmytaxi-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://tagmytaxi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/tagmytaxi
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme-use-strong-secret-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3001:3001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - backend
      - frontend

  web-app:
    build:
      context: .
      dockerfile: packages/web-app/Dockerfile
      target: production
    container_name: tagmytaxi-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - frontend

  # ── Reverse proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tagmytaxi-nginx
    volumes:
      - ./deployment/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - api
      - web-app
    networks:
      - frontend

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
